<!DOCTYPE html>
<html>
<head>
  <title>Studyhub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-box">
        <p class="tagline">Design Develop Deliver</p>

        <button id="adminBtn" class="admin-btn" onclick="goToAdmin()" style="display:none;">Admin Panel</button>

        <h2>Resources</h2>

        <button id="unrealBtn" class="resource-btn" onclick="openSection('unreal')">Unreal Engine</button>
        <button id="mayaBtn" class="resource-btn" onclick="openSection('maya')">Maya</button>

        <div class="button-group">
          <button id="backBtn" class="back-btn" style="display:none;" onclick="goBack()">Back</button>
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
</div>
<div id="content"></div>

<script src="script.js"></script>
<script>
  // Only show admin button if user is actually the admin with correct credentials
  if (localStorage.getItem("isAdmin") === "true") {
    let currentUser = JSON.parse(localStorage.getItem("currentUser")) || {};
    if (currentUser.name === "pixelcoder" && currentUser.roll === "231702005") {
      document.getElementById("adminBtn").style.display = "block";
    }
  }
</script>
</body>
</html>
