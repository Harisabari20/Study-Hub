<!DOCTYPE html>
<html>
<head>
  <title>Studyhub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="animated-header"><strong>Study Hub</strong></h1>

<p class="tagline">Built for Students, by Student</p>

<div class="login-box">
  <h2>Student Login</h2>
  <span class="error-message" id="generalError"></span>
  <input type="text" id="name" placeholder="Enter Name">
  <input type="text" id="roll" placeholder="Enter Roll Number">
  <span class="error-message" id="rollError"></span>
  <input type="text" id="class" placeholder="Enter Department">

  <button onclick="login()">Login</button>
</div>

<script src="script.js"></script>
</body>
</html>
